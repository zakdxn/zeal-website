<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Built Zeal</title>
  <style>
    /* --- Tweakable Variables --- */
    :root {
      --vertical-offset: 30%; /* change this to move text up/down */
      --heading-size: 2.5rem;   /* adjust H1 size */
      --subtext-size: 1.5rem;   /* adjust P size */
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-top: var(--vertical-offset);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #ffffff;
      color: #111111;
      text-align: center;
    }

    h1 {
      font-size: var(--heading-size);
      margin: 0.5rem 0;
    }

    p {
      font-size: var(--subtext-size);
      color: #555555;
      margin: 0;
    }
  </style>
</head>
<body>
  <h1>Welcome to Zeal.</h1>
  <p>Coming Soon.</p>
</body>
</html>
